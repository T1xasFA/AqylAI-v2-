    <style>
      * { box-sizing: border-box; }

      :root {
        --bg-deep: #050d14;
        --bg-base: #080f17;
        --bg-surface: #0d1a26;
        --bg-card: #111f2e;
        --bg-card2: #162435;
        --accent: #10d4a0;
        --accent-dim: #0aa880;
        --accent-glow: rgba(16,212,160,0.2);
        --accent2: #6366f1;
        --accent2-glow: rgba(99,102,241,0.2);
        --warn: #f59e0b;
        --danger: #ef4444;
        --text: #e2ecf4;
        --text-muted: #7a96b0;
        --text-dim: #3d5670;
        --border: rgba(255,255,255,0.07);
        --border-accent: rgba(16,212,160,0.25);
      }

      html { scroll-behavior: smooth; }
      body {
        font-family: 'Sora', sans-serif;
        background: var(--bg-deep);
        color: var(--text);
        font-size: 15px;
        line-height: 1.65;
        overflow-x: hidden;
      }

      /* KaTeX */
      .katex { font-size: 1em; }
      .katex-display { margin: 0; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg-base); }
      ::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

      /* Animations */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
        50% { box-shadow: 0 0 40px rgba(16,212,160,0.35); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      @keyframes orbit {
        from { transform: rotate(0deg) translateX(160px) rotate(0deg); }
        to { transform: rotate(360deg) translateX(160px) rotate(-360deg); }
      }
      @keyframes shimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      @keyframes typing {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
        30% { transform: translateY(-6px); opacity: 1; }
      }
      @keyframes correctPop {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }
      @keyframes slideIn {
        from { opacity: 0; transform: translateX(10px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes glowPulse {
        0%,100% { opacity: 0.5; }
        50% { opacity: 1; }
      }

      .fade-up { animation: fadeUp 0.5s ease forwards; }
      .fade-in { animation: fadeIn 0.4s ease forwards; }
      .float { animation: float 4s ease-in-out infinite; }

      /* Grid bg */
      .grid-bg {
        background-image: linear-gradient(var(--border) 1px, transparent 1px),
                          linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 40px 40px;
      }

      /* Glass card */
      .glass {
        background: rgba(13,26,38,0.7);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border);
      }
      .glass-bright {
        background: rgba(17,31,46,0.85);
        backdrop-filter: blur(24px);
        border: 1px solid rgba(255,255,255,0.1);
      }

      /* Accent button */
      .btn-accent {
        background: var(--accent);
        color: #050d14;
        font-weight: 700;
        transition: all 0.2s;
      }
      .btn-accent:hover {
        background: #14f2b4;
        transform: translateY(-1px);
        box-shadow: 0 8px 24px var(--accent-glow);
      }
      .btn-accent:active { transform: translateY(0); }

      /* Secondary button */
      .btn-ghost {
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--border);
        color: var(--text-muted);
        transition: all 0.2s;
      }
      .btn-ghost:hover {
        background: rgba(255,255,255,0.1);
        color: var(--text);
        border-color: rgba(255,255,255,0.15);
      }

      /* Progress bar */
      .progress-bar {
        height: 4px;
        border-radius: 2px;
        background: var(--bg-card2);
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        border-radius: 2px;
        background: linear-gradient(90deg, var(--accent), #14f2b4);
        transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      /* Message bubble */
      .msg-user {
        background: linear-gradient(135deg, rgba(16,212,160,0.15), rgba(16,212,160,0.08));
        border: 1px solid rgba(16,212,160,0.2);
        color: #c8f0e8;
        animation: slideIn 0.25s ease;
      }
      .msg-ai {
        background: rgba(22,36,53,0.9);
        border: 1px solid var(--border);
        color: var(--text);
        animation: slideIn 0.25s ease;
      }

      /* Typing indicator */
      .typing-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--accent);
        animation: typing 1.2s ease-in-out infinite;
      }
      .typing-dot:nth-child(2) { animation-delay: 0.2s; }
      .typing-dot:nth-child(3) { animation-delay: 0.4s; }

      /* Hero glow orbs */
      .glow-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
      }

      /* Shimmer text */
      .shimmer-text {
        background: linear-gradient(90deg, var(--accent), #6ee7d4, var(--accent));
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 3s linear infinite;
      }

      /* Stat card */
      .stat-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px 24px;
        transition: border-color 0.2s, transform 0.2s;
      }
      .stat-card:hover {
        border-color: var(--border-accent);
        transform: translateY(-2px);
      }

      /* Topic card hover */
      .topic-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 16px;
        transition: all 0.25s;
        cursor: pointer;
      }
      .topic-card:hover {
        background: var(--bg-card2);
        border-color: var(--border-accent);
        transform: translateY(-3px);
        box-shadow: 0 12px 32px rgba(0,0,0,0.3);
      }

      /* Correct/Wrong answer flash */
      .answer-correct { animation: correctPop 0.4s ease; }

      /* Level badge */
      .badge-easy { background: rgba(16,212,160,0.12); color: var(--accent); border: 1px solid rgba(16,212,160,0.3); }
      .badge-medium { background: rgba(245,158,11,0.12); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
      .badge-hard { background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

      /* Nav active */
      .nav-link {
        position: relative;
        color: var(--text-muted);
        transition: color 0.2s;
        font-size: 14px;
        font-weight: 500;
      }
      .nav-link:hover { color: var(--text); }
      .nav-link::after {
        content: '';
        position: absolute;
        bottom: -2px; left: 50%; right: 50%;
        height: 1px;
        background: var(--accent);
        transition: left 0.2s, right 0.2s;
      }
      .nav-link:hover::after { left: 0; right: 0; }

      /* Feature card */
      .feature-icon {
        width: 48px; height: 48px;
        border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        font-size: 22px;
        margin-bottom: 16px;
      }

      /* Input */
      .input-field {
        width: 100%;
        background: rgba(8,15,23,0.8);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 14px;
        color: var(--text);
        font-family: 'Sora', sans-serif;
        font-size: 14px;
        transition: border-color 0.2s, box-shadow 0.2s;
        outline: none;
      }
      .input-field:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(16,212,160,0.12);
      }
      .input-field::placeholder { color: var(--text-dim); }

      /* Code/mono font */
      .mono { font-family: 'JetBrains Mono', monospace; }

      /* Orbit container */
      .orbit-container {
        position: relative;
        width: 340px; height: 340px;
      }
      .orbit-center {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 100px; height: 100px;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(16,212,160,0.2), rgba(99,102,241,0.2));
        border: 1px solid var(--border-accent);
        display: flex; align-items: center; justify-content: center;
        font-size: 36px;
      }
      .orbit-ring {
        position: absolute;
        top: 50%; left: 50%;
        width: 320px; height: 320px;
        border-radius: 50%;
        border: 1px dashed rgba(16,212,160,0.15);
        transform: translate(-50%, -50%);
      }
      .orbit-item {
        position: absolute;
        top: 50%; left: 50%;
        width: 52px; height: 52px;
        border-radius: 12px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        display: flex; align-items: center; justify-content: center;
        font-size: 14px;
        color: var(--text);
        animation: orbit linear infinite;
        margin-left: -26px; margin-top: -26px;
      }

      /* Section transitions */
      section { opacity: 1; }

      /* Hero backdrop text */
      .hero-bg-text {
        font-size: clamp(80px, 15vw, 180px);
        font-weight: 800;
        color: transparent;
        -webkit-text-stroke: 1px rgba(16,212,160,0.06);
        letter-spacing: -0.02em;
        pointer-events: none;
        user-select: none;
        line-height: 1;
      }

      /* Landing section snap removed for better scroll */
      body { scroll-snap-type: none; }
      section { scroll-snap-align: none; }
    </style>

      const renderInlineMath = (s) => {
        const text = String(s);
        const parts = text.split(/(\$[^$]+\$)/g).filter(Boolean);
        return parts.map(p => {
          if (p.startsWith("$") && p.endsWith("$")) {
            try { return katex.renderToString(p.slice(1,-1), { throwOnError: false }); }
            catch { return p.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
          }
          return p.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        }).join("");
      };

        const text = String(s);
        if (text.includes("$")) return renderInlineMath(text);
        const looksLike = /^[\s\\0-9a-zA-Z+\-*/^_=(){}\[\].,|:]+$/.test(text) && /\\|=|\^|_/.test(text);

      const TaskCard = ({ idx, task, onCheck, onAnswerChange, historyEntry }) => {

        useEffect(() => {

          else { setInput(""); setStatus(null); }
        }, [task?.id]);

        const norm = (s) => s.replace(/\s+/g, "").toLowerCase();

        const check = () => {
          const ok = norm(input) === norm(task.a);
          setStatus(ok);
          onCheck?.(ok);
          if (!ok) { setShake(true); setTimeout(() => setShake(false), 600); }

        const borderColor = status === true ? "rgba(16,212,160,0.4)" : status === false ? "rgba(239,68,68,0.4)" : "var(--border)";

              />
              <button
                onClick={check}
                disabled={!input.trim() || status === true}

      // ============================================================
      // SHARED AI FETCH — with wake-up retry + timeout
      // ============================================================
      const BASE_URL = (location.hostname === "127.0.0.1" || location.hostname === "localhost")
        ? "http://127.0.0.1:8000"
        : "https://backend-umur.onrender.com";

      const fetchWithTimeout = (url, options, ms = 12000) => {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), ms);
        return fetch(url, { ...options, signal: ctrl.signal })
          .finally(() => clearTimeout(timer));
      };

      // Pings /health to wake the server, then retries the real request once
      const aiRequest = async (payload, onStatus) => {
        const API_URL = BASE_URL + "/api/ai";
        const HEALTH_URL = BASE_URL + "/health";

        const doFetch = () => fetchWithTimeout(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        }, 15000);

        try {
          const resp = await doFetch();
          if (!resp.ok) throw new Error(`Server error ${resp.status}`);
          return await resp.json();
        } catch (e) {
          const isNetworkErr = e.name === "AbortError" || e.message === "Failed to fetch" || e.name === "TypeError";
          if (!isNetworkErr) throw e;

          // Server is likely sleeping — ping /health to wake it, then retry once
          onStatus?.("waking");
          try {
            await fetchWithTimeout(HEALTH_URL, {}, 30000);
          } catch (_) { /* ignore — just waking */ }

          onStatus?.("retrying");
          const resp2 = await fetchWithTimeout(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          }, 20000);
          if (!resp2.ok) throw new Error(`Server error ${resp2.status}`);
          return await resp2.json();
        }
      };
