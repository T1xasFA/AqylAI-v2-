      const AssistantPanel = ({ task, userAnswer }) => {
        const chatRef = useRef(null);
        const [messages, setMessages] = useState([]);
        const [text, setText] = useState("");
        const [loading, setLoading] = useState(false);
        const [loadingStatus, setLoadingStatus] = useState(""); // "", "waking", "retrying"
        const [err, setErr] = useState(null);
        const [lastCorrect, setLastCorrect] = useState(null);

        useEffect(() => { setMessages([]); setText(""); setErr(null); setLoading(false); setLoadingStatus(""); setLastCorrect(null); }, [task?.id]);
        useEffect(() => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; }, [messages, loading]);

        const send = async (userMessage) => {
          const clean = (userMessage || "").trim();
          if (!clean || loading) return;
          setErr(null);
          setMessages(prev => [...prev, { role: "user", content: clean }]);
          setText("");
          setLoading(true);
          setLoadingStatus("");

          try {
            const data = await aiRequest({
              taskText: task?.q || null,
              expectedAnswer: task?.a || null,
              userAnswer: userAnswer || null,
              userMessage: clean,
              history: messages,
              lang: "kk",
            }, setLoadingStatus);

            let txt = data?.reply || "Жауап бос болды. Тағы бір рет сұрап көріңіз.";
            if (Array.isArray(data?.steps) && data.steps.length)
              txt += "\n\nҚадамдар:\n" + data.steps.map((s, i) => `${i + 1}) ${s}`).join("\n");
            if (data?.short_hint) txt += `\n\nКеңес: ${data.short_hint}`;
            if (data?.final_answer) txt += `\n\n✅ Қорытынды: ${data.final_answer}`;
            setLastCorrect(data?.correct === true ? true : data?.correct === false ? false : null);
            setMessages(prev => [...prev, { role: "assistant", content: txt }]);
          } catch (e) {
            const msg = e.name === "AbortError"
              ? "Сервер жауап бермеді (timeout). Render.com серверін тексер."
              : e.message === "Failed to fetch"
              ? "Серверге жетпеді. Render.com ұйқыда болуы мүмкін — 30 сек күтіп қайталап көр."
              : `Қате: ${e.message}`;
            setErr(msg);
          } finally {
            setLoading(false);
            setLoadingStatus("");
          }
        };

        const quickBtns = [
          { label: "💡 Hint", msg: "Маған өте қысқа hint берші (жауапты толық айтпай)." },
          { label: "🔍 Түсіндір", msg: "Түсінбей тұрмын. Бір қадаммен түсіндірші, мен жалғастырайын." },
          { label: "❌ Қате?", msg: "Менің қателігім қай жерде? Қысқаша көрсетші." },
        ];

        const statusLabel = {
          waking: "⏳ Сервер оянуда (Render free tier)…",
          retrying: "🔄 Қайта жіберілуде…",
        }[loadingStatus] || "AI ойлануда…";

        return (
          <div style={{ background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 20, overflow: "hidden" }}>
            {/* Header */}
            <div style={{ padding: "14px 20px", borderBottom: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ width: 8, height: 8, borderRadius: "50%", background: loading ? "#f59e0b" : "var(--accent2)",
                  boxShadow: `0 0 10px ${loading ? "rgba(245,158,11,0.6)" : "rgba(99,102,241,0.5)"}`,
                  animation: "glowPulse 2s ease infinite" }} />
                <span style={{ fontWeight: 600, fontSize: 14, color: "white" }}>AI Тьютор</span>
                {loading && (
                  <span style={{ fontSize: 11, color: loadingStatus === "waking" ? "#fbbf24" : "var(--text-muted)", fontStyle: "italic" }}>
                    {statusLabel}
                  </span>
                )}
              </div>
              <div style={{
                fontSize: 11, fontWeight: 700, padding: "4px 10px", borderRadius: 50,
                ...(lastCorrect === true
                  ? { background: "rgba(16,212,160,0.12)", color: "var(--accent)", border: "1px solid rgba(16,212,160,0.3)" }
                  : lastCorrect === false
                  ? { background: "rgba(239,68,68,0.12)", color: "#f87171", border: "1px solid rgba(239,68,68,0.3)" }
                  : { background: "rgba(255,255,255,0.05)", color: "var(--text-muted)", border: "1px solid var(--border)" })
              }}>
                {lastCorrect === true ? "✓ Дұрыс" : lastCorrect === false ? "✗ Қате" : "—"}
              </div>
            </div>

            {/* Current task */}
            {task && (
              <div style={{ padding: "10px 20px", borderBottom: "1px solid var(--border)", background: "rgba(0,0,0,0.2)" }}>
                <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 5, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em" }}>Тапсырма</div>
                <div style={{ fontSize: 16, color: "white" }} dangerouslySetInnerHTML={{ __html: renderLatexSafe(task.q) }} />
                {userAnswer?.trim() && (
                  <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 5 }}>
                    Жауабыңыз: <span style={{ color: "var(--text)" }}>{userAnswer}</span>
                  </div>
                )}
              </div>
            )}

            {/* Quick buttons */}
            <div style={{ padding: "10px 14px", borderBottom: "1px solid var(--border)", display: "flex", gap: 6, flexWrap: "wrap" }}>
              {quickBtns.map((b, i) => (
                <button key={i} onClick={() => send(b.msg)} disabled={loading}
                  className="btn-ghost" style={{ borderRadius: 8, padding: "5px 10px", fontSize: 12, opacity: loading ? 0.5 : 1, cursor: loading ? "not-allowed" : "pointer" }}>
                  {b.label}
                </button>
              ))}
              {messages.length > 0 && (
                <button onClick={() => { setMessages([]); setErr(null); setLastCorrect(null); }} disabled={loading}
                  className="btn-ghost" style={{ borderRadius: 8, padding: "5px 10px", fontSize: 12, marginLeft: "auto", opacity: loading ? 0.4 : 1 }}>
                  🗑
                </button>
              )}
            </div>

            {/* Chat window */}
            <div ref={chatRef} style={{ height: 260, overflowY: "auto", padding: "14px", display: "flex", flexDirection: "column", gap: 10 }}>
              {messages.length === 0 && !err && (
                <div style={{ color: "var(--text-muted)", fontSize: 13, textAlign: "center", marginTop: 60, lineHeight: 1.7 }}>
                  💬 Сұрағыңды жаз<br />немесе жоғарыдағы батырмаларды қолдан
                </div>
              )}
              {messages.map((m, i) => (
                <div key={i} className={m.role === "user" ? "msg-user" : "msg-ai"}
                  style={{ maxWidth: "88%", padding: "10px 14px", borderRadius: 12, fontSize: 13, lineHeight: 1.6, whiteSpace: "pre-wrap",
                    alignSelf: m.role === "user" ? "flex-end" : "flex-start" }}>
                  {m.content}
                </div>
              ))}
              {loading && (
                <div style={{ alignSelf: "flex-start", background: "var(--bg-card2)", border: "1px solid var(--border)", borderRadius: 12, padding: "12px 16px", display: "flex", gap: 6, alignItems: "center" }}>
                  <div className="typing-dot" /><div className="typing-dot" /><div className="typing-dot" />
                  {loadingStatus === "waking" && (
                    <span style={{ fontSize: 11, color: "#fbbf24", marginLeft: 4 }}>Сервер оянуда…</span>
                  )}
                </div>
              )}
            </div>

            {/* Error */}
            {err && (
              <div style={{ margin: "0 14px 10px", background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.25)", borderRadius: 12, padding: "12px 14px" }}>
                <div style={{ fontSize: 12, color: "#f87171", marginBottom: 8, lineHeight: 1.5 }}>⚠ {err}</div>
                <button onClick={() => { setErr(null); if (messages.length > 0) { const last = messages[messages.length-1]; if (last.role === "user") { setMessages(prev => prev.slice(0,-1)); send(last.content); } } }}
                  style={{ padding: "5px 12px", borderRadius: 8, background: "rgba(239,68,68,0.15)", border: "1px solid rgba(239,68,68,0.3)", color: "#f87171", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "Sora, sans-serif" }}>
                  🔄 Қайталап көр
                </button>
              </div>
            )}

            {/* Input */}
            <div style={{ padding: "10px 14px 14px", borderTop: "1px solid var(--border)", display: "flex", gap: 8 }}>
              <textarea className="input-field"
                placeholder="Сұрағыңды жаз… (Enter — жіберу)"
                value={text}
                onChange={e => setText(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(text); } }}
                style={{ flex: 1, minHeight: 42, maxHeight: 100, resize: "none", padding: "10px 14px", fontSize: 13 }}
              />
              <button onClick={() => send(text)} disabled={loading || !text.trim()}
                className="btn-accent" style={{ borderRadius: 10, padding: "0 16px", fontSize: 18, opacity: (loading || !text.trim()) ? 0.4 : 1, cursor: (loading || !text.trim()) ? "not-allowed" : "pointer" }}>
                →
              </button>
            </div>
          </div>
        );
      };

      // ============================================================
      // STAT CARD COMPONENT
      // ============================================================
      const StatCard = ({ title, value, icon, color = "var(--accent)" }) => (
        <div className="stat-card">
          {icon && <div style={{ fontSize: 20, marginBottom: 8 }}>{icon}</div>}
          <div style={{ fontSize: 28, fontWeight: 800, color, letterSpacing: "-0.03em" }}>{value}</div>
          <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 4 }}>{title}</div>
        </div>
      );

      // ============================================================
      // PROFILE VIEW
      // ============================================================
      const ProfileView = ({ onBack, onGoTasks }) => {
        const currentUser = localStorage.getItem("aqylai_current_user");
        const [name, setName] = useState(currentUser || "Оқушы");
        const [editing, setEditing] = useState(false);
        const grade = Number(localStorage.getItem("aqylai_grade") || 8);
        const topics = TASK_BANK[grade] || {};

        const topicStats = Object.entries(topics).map(([key, td]) => {
          const raw = localStorage.getItem(`aqylai_progress_${grade}_${key}`);
          const total = (td.easy?.length||0)+(td.medium?.length||0)+(td.hard?.length||0);
          if (!raw) return { title: td.title, solved: 0, total, zpd: 0 };
          const parsed = JSON.parse(raw);
          return { title: td.title, solved: parsed.solved||0, total, zpd: parsed.zpd||0 };
        });

        const totalSolved = topicStats.reduce((s,t) => s+t.solved, 0);
        const totalTasks = topicStats.reduce((s,t) => s+t.total, 0);
        const overallPercent = totalTasks > 0 ? Math.round((totalSolved/totalTasks)*100) : 0;
        const avgZpd = topicStats.length > 0 ? Math.round(topicStats.reduce((s,t)=>s+t.zpd,0)/topicStats.length) : 0;
        const xp = totalSolved * 10 + avgZpd * 2;

        const levels = [
          { name: "Beginner 🌱", min: 0, next: 300 },
          { name: "Explorer 🔍", min: 300, next: 800 },
          { name: "Challenger ⚡", min: 800, next: 1500 },
          { name: "Advanced 🎯", min: 1500, next: 2500 },
          { name: "Master 🏆", min: 2500, next: 9999 },
        ];
        const currentLevel = levels.reduce((acc, l) => xp >= l.min ? l : acc, levels[0]);
        const nextLevel = levels[levels.indexOf(currentLevel)+1];
        const levelProgress = nextLevel ? Math.min(100, Math.round(((xp - currentLevel.min) / (nextLevel.min - currentLevel.min)) * 100)) : 100;

        const streakDays = (() => {
          const h = JSON.parse(localStorage.getItem("aqylai_growth")||"[]");
          const today = new Date().toLocaleDateString();
          if (!h.find(x=>x.date===today)) return 1;
          return Math.min(h.length, 7);
        })();

        const badges = [];
        if (xp >= 100) badges.push("🌱 Бастамашы");
        if (totalSolved >= 10) badges.push("📚 10 есеп");
        if (totalSolved >= 25) badges.push("🔥 25 есеп");
        if (avgZpd >= 50) badges.push("⚡ ZPD 50+");
        if (avgZpd >= 80) badges.push("🧠 ZPD Маэстро");
        if (streakDays >= 3) badges.push("🔗 3 күн қатар");

        const saveName = () => {
          localStorage.setItem("aqylai_current_user", name);
          setEditing(false);
        };

        return (
          <div style={{ maxWidth: 1100, margin: "0 auto", padding: "100px 24px 60px" }}>
            {/* Header */}
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 32 }}>
              <button onClick={onBack} className="btn-ghost" style={{ borderRadius: 50, padding: "8px 16px", fontSize: 13 }}>← Артқа</button>
              <div style={{ fontSize: 22, fontWeight: 800, color: "white" }}>Профиль</div>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "300px 1fr", gap: 24 }}>
              {/* Left panel */}
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                {/* Avatar card */}
                <div style={{ background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 20, padding: 24 }}>
                  <div style={{ width: 72, height: 72, borderRadius: "50%", background: "linear-gradient(135deg, var(--accent), var(--accent2))", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, marginBottom: 16 }}>
                    {name[0] || "О"}
                  </div>
                  {editing ? (
                    <div style={{ display: "flex", gap: 8 }}>
                      <input className="input-field" value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key === "Enter" && saveName()} style={{ flex: 1 }} autoFocus />
                      <button onClick={saveName} className="btn-accent" style={{ borderRadius: 8, padding: "6px 12px" }}>✓</button>
                    </div>
                  ) : (
                    <div onClick={() => setEditing(true)} style={{ fontSize: 18, fontWeight: 700, color: "white", cursor: "pointer" }}>{name}</div>
                  )}
                  <div style={{ fontSize: 13, color: "var(--text-muted)", marginTop: 4 }}>{grade}-сынып</div>
                </div>

                {/* Level card */}
                <div style={{ background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 20, padding: 24 }}>
                  <div style={{ fontSize: 12, color: "var(--text-muted)", fontWeight: 600, marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.1em" }}>Деңгей</div>
                  <div style={{ fontSize: 18, fontWeight: 700, color: "var(--accent)", marginBottom: 16 }}>{currentLevel.name}</div>
                  <div className="progress-bar">
                    <div className="progress-fill" style={{ width: `${levelProgress}%` }} />
                  </div>
                  <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 8, display: "flex", justifyContent: "space-between" }}>
                    <span>{xp} XP</span>
                    {nextLevel && <span>→ {nextLevel.min} XP</span>}
                  </div>
                </div>

                {/* Quick stats */}
                <div style={{ background: "rgba(255,165,0,0.08)", border: "1px solid rgba(255,165,0,0.2)", borderRadius: 16, padding: "16px 20px", display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ fontSize: 24 }}>🔥</span>
                  <div>
                    <div style={{ fontWeight: 700, color: "#fbbf24" }}>{streakDays} күн қатарынан</div>
                    <div style={{ fontSize: 12, color: "var(--text-muted)" }}>Белсенді кезең</div>
                  </div>
                </div>

                <button onClick={() => onGoTasks(grade)} className="btn-accent" style={{ borderRadius: 14, padding: "14px", fontSize: 15, textAlign: "center" }}>
                  Жалғастыру →
                </button>
                <button onClick={() => { localStorage.removeItem("aqylai_current_user"); window.location.reload(); }}
                  style={{ borderRadius: 14, padding: "10px", fontSize: 13, background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.2)", color: "#f87171", cursor: "pointer", fontFamily: "Sora, sans-serif" }}>
                  Шығу
                </button>
              </div>

              {/* Right panel */}
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                {/* Stats row */}
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16 }}>
                  <StatCard title="Жалпы прогресс" value={`${overallPercent}%`} icon="📊" />
                  <StatCard title="Орташа ZPD" value={`${avgZpd}%`} icon="🧠" color="var(--accent2)" />
                  <StatCard title="XP ұпайлар" value={xp} icon="⭐" color="#fbbf24" />
                </div>

                {/* Weekly goal */}
                <div style={{ background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 20, padding: 24 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16 }}>
                    <div style={{ fontWeight: 700, color: "white" }}>🎯 Апталық мақсат</div>
                    <div style={{ fontSize: 13, color: "var(--text-muted)" }}>{totalSolved}/20 тапсырма</div>
                  </div>
                  <div className="progress-bar" style={{ height: 8 }}>
                    <div className="progress-fill" style={{ width: `${Math.min(100, Math.round(totalSolved/20*100))}%`, height: "100%" }} />
                  </div>
                </div>

                {/* Badges */}
                <div style={{ background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 20, padding: 24 }}>
                  <div style={{ fontWeight: 700, color: "white", marginBottom: 16 }}>Бейдждер</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                    {badges.length === 0 ? (
                      <div style={{ color: "var(--text-muted)", fontSize: 13 }}>Тапсырмаларды орындап бейдж жина!</div>
                    ) : badges.map((b, i) => (
                      <div key={i} style={{ padding: "6px 14px", borderRadius: 50, background: "rgba(99,102,241,0.12)", border: "1px solid rgba(99,102,241,0.25)", fontSize: 13, color: "#a5b4fc" }}>{b}</div>
                    ))}
                  </div>
                </div>

                {/* Topic progress */}
                <div style={{ background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 20, padding: 24 }}>
                  <div style={{ fontWeight: 700, color: "white", marginBottom: 16 }}>Тақырыптар бойынша</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                    {topicStats.map((t, i) => {
                      const p = t.total > 0 ? Math.round((t.solved/t.total)*100) : 0;
                      return (
                        <div key={i}>
                          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 6 }}>
                            <span style={{ color: "var(--text)" }}>{t.title}</span>
                            <span style={{ color: "var(--text-muted)" }}>{t.solved}/{t.total}</span>
                          </div>
                          <div className="progress-bar" style={{ height: 6 }}>
                            <div className="progress-fill" style={{ width: `${p}%`, height: "100%" }} />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ============================================================
      // THEORY AI EXPLAINER — inline per-section AI panel
      // ============================================================
      const TheoryAIExplainer = ({ context, lessonTitle }) => {
        const [open, setOpen] = useState(false);
        const [reply, setReply] = useState(null);
        const [loading, setLoading] = useState(false);
        const [err, setErr] = useState(null);
        const [customQ, setCustomQ] = useState("");
        const [mode, setMode] = useState("quick"); // quick | custom

        const presets = [
          { label: "Қарапайым түсіндір", q: `"${lessonTitle}" тақырыбын 7-сыныпшыға түсіндіргендей өте қарапайым тілмен айт.` },
          { label: "Мысал бер", q: `"${lessonTitle}" тақырыбына нақты өмірден 1 мысал кел.` },
          { label: "Жалпы қателер", q: `"${lessonTitle}" тақырыбын оқығанда оқушылар жиі қандай қате жасайды?` },
          { label: "Формуланы түсіндір", q: `"${lessonTitle}" бөліміндегі формуланы толығырақ түсіндіреміз, контекст: ${context}` },
        ];

        const [wakingUp, setWakingUp] = useState(false);

        const ask = async (question) => {
          setReply(null); setErr(null); setLoading(true); setWakingUp(false);
          try {
            const data = await aiRequest({
              taskText: lessonTitle, userMessage: question,
              history: [], lang: "kk", userAnswer: null, expectedAnswer: null,
            }, (status) => { if (status === "waking") setWakingUp(true); else setWakingUp(false); });
            setReply(data?.reply || "Жауап бос болды.");
          } catch(e) {
            setErr(e.name === "AbortError" || e.message === "Failed to fetch"
              ? "Сервер оянуда, қайталап көр…"
              : e.message);
          }
          finally { setLoading(false); setWakingUp(false); }
        };

        if (!open) return (
          <button onClick={() => setOpen(true)}
            style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "5px 12px", borderRadius: 8,
              background: "rgba(99,102,241,0.1)", border: "1px solid rgba(99,102,241,0.2)",
              color: "#a5b4fc", fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "Sora, sans-serif",
              transition: "all 0.2s" }}>
            🤖 AI-ге сұра
          </button>
        );

        return (
          <div style={{ marginTop: 12, background: "rgba(99,102,241,0.05)", border: "1px solid rgba(99,102,241,0.2)", borderRadius: 14, overflow: "hidden" }}>
            {/* Header */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 16px", borderBottom: "1px solid rgba(99,102,241,0.15)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#818cf8", animation: "glowPulse 2s infinite" }} />
                <span style={{ fontSize: 12, fontWeight: 700, color: "#a5b4fc" }}>AI Тьютор сұрақ</span>
              </div>
              <button onClick={() => { setOpen(false); setReply(null); setErr(null); }}
                style={{ background: "none", border: "none", color: "var(--text-muted)", cursor: "pointer", fontSize: 16, lineHeight: 1 }}>×</button>
            </div>

            {/* Preset buttons */}
            <div style={{ padding: "10px 16px", display: "flex", gap: 6, flexWrap: "wrap" }}>
              {presets.map((p, i) => (
                <button key={i} onClick={() => { setMode("quick"); ask(p.q); }}
                  disabled={loading}
                  style={{ padding: "5px 10px", borderRadius: 8, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "Sora, sans-serif",
                    background: "rgba(99,102,241,0.1)", border: "1px solid rgba(99,102,241,0.2)", color: "#c7d2fe",
                    opacity: loading ? 0.5 : 1, transition: "all 0.15s" }}>
                  {p.label}
                </button>
              ))}
            </div>

            {/* Custom question */}
            <div style={{ padding: "0 16px 10px", display: "flex", gap: 8 }}>
              <input className="input-field"
                placeholder="Өз сұрағыңды жаз..."
                value={customQ} onChange={e => setCustomQ(e.target.value)}
                onKeyDown={e => e.key === "Enter" && customQ.trim() && (ask(customQ), setCustomQ(""))}
                style={{ fontSize: 12 }} />
              <button onClick={() => { if(customQ.trim()) { ask(customQ); setCustomQ(""); } }}
                disabled={loading || !customQ.trim()}
                style={{ padding: "0 14px", borderRadius: 8, background: "#6366f1", border: "none", color: "white",
                  fontSize: 16, cursor: "pointer", opacity: (loading||!customQ.trim()) ? 0.4 : 1 }}>→</button>
            </div>

            {/* Response area */}
            {(loading || reply || err) && (
              <div style={{ margin: "0 16px 14px", padding: "12px 14px", borderRadius: 10, background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.06)", minHeight: 44 }}>
                {loading && (
                  <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
                    <div className="typing-dot" style={{ background: "#818cf8" }} />
                    <div className="typing-dot" style={{ background: "#818cf8" }} />
                    <div className="typing-dot" style={{ background: "#818cf8" }} />
                    <span style={{ fontSize: 12, color: wakingUp ? "#fbbf24" : "var(--text-muted)", marginLeft: 6 }}>
                      {wakingUp ? "⏳ Сервер оянуда…" : "AI ойлануда…"}
                    </span>
                  </div>
                )}
                {reply && <div style={{ fontSize: 13, color: "var(--text)", lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{reply}</div>}
                {err && <div style={{ fontSize: 12, color: "#f87171" }}>⚠ {err}</div>}
              </div>
            )}
          </div>
        );
      };

      // ============================================================
      // FORMULA BLOCK — with copy button
      // ============================================================
      const FormulaBlock = ({ title, formula }) => {
        const [copied, setCopied] = useState(false);
        const copy = () => {
          navigator.clipboard?.writeText(formula).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1500); });
        };
        return (
          <div style={{ background: "linear-gradient(135deg, rgba(16,212,160,0.06), rgba(16,212,160,0.02))", border: "1px solid rgba(16,212,160,0.25)", borderRadius: 16, overflow: "hidden" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 16px", borderBottom: "1px solid rgba(16,212,160,0.12)", background: "rgba(16,212,160,0.04)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 14 }}>📐</span>
                <span style={{ fontSize: 11, fontWeight: 700, color: "var(--accent)", textTransform: "uppercase", letterSpacing: "0.1em" }}>{title}</span>
              </div>
              <button onClick={copy}
                style={{ padding: "3px 10px", borderRadius: 6, background: copied ? "rgba(16,212,160,0.2)" : "rgba(255,255,255,0.05)",
                  border: `1px solid ${copied ? "rgba(16,212,160,0.4)" : "var(--border)"}`, color: copied ? "var(--accent)" : "var(--text-muted)",
                  fontSize: 10, fontWeight: 700, cursor: "pointer", fontFamily: "Sora, sans-serif", transition: "all 0.2s" }}>
                {copied ? "✓ Көшірілді" : "Көшіру"}
              </button>
            </div>
            <div style={{ padding: "20px 24px", textAlign: "center" }}
              dangerouslySetInnerHTML={{ __html: katex.renderToString(formula, { throwOnError: false, displayMode: true }) }} />
          </div>
        );
      };

      // ============================================================
      // STEP-THROUGH EXAMPLE — animated reveal
      // ============================================================
      const StepThroughExample = ({ sec }) => {
        const [revealed, setRevealed] = useState(0);
        const [showAnswer, setShowAnswer] = useState(false);
        const steps = sec.steps || [];
        const allDone = revealed >= steps.length;

        const reset = () => { setRevealed(0); setShowAnswer(false); };

        return (
          <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid var(--border)", borderRadius: 16, overflow: "hidden" }}>
            {/* Header */}
            <div style={{ padding: "10px 16px 10px", borderBottom: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "rgba(255,255,255,0.02)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 14 }}>🔢</span>
                <span style={{ fontSize: 11, fontWeight: 700, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.1em" }}>{sec.title}</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 11, color: "var(--text-muted)" }}>{Math.min(revealed, steps.length)}/{steps.length} қадам</span>
                {revealed > 0 && (
                  <button onClick={reset}
                    style={{ padding: "2px 8px", borderRadius: 6, background: "rgba(255,255,255,0.05)", border: "1px solid var(--border)", color: "var(--text-muted)", fontSize: 10, cursor: "pointer", fontFamily: "Sora, sans-serif" }}>
                    ↺ Қайта
                  </button>
                )}
              </div>
            </div>

            <div style={{ padding: 20 }}>
              {/* Task */}
              {sec.task && (
                <div style={{ marginBottom: 20, padding: "12px 16px", background: "rgba(0,0,0,0.3)", borderRadius: 12, borderLeft: "3px solid var(--accent)" }}>
                  <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 6, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em" }}>Есеп:</div>
                  <div style={{ color: "white", fontSize: 17 }} dangerouslySetInnerHTML={{ __html: renderMixed(sec.task) }} />
                </div>
              )}

              {/* Steps */}
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {steps.map((s, j) => {
                  const visible = j < revealed;
                  return (
                    <div key={j} style={{
                      display: "flex", gap: 14, alignItems: "flex-start",
                      opacity: visible ? 1 : 0.15, transition: "opacity 0.4s ease, transform 0.4s ease",
                      transform: visible ? "translateX(0)" : "translateX(-8px)",
                    }}>
                      <div style={{
                        minWidth: 28, height: 28, borderRadius: "50%", flexShrink: 0,
                        background: visible ? "rgba(16,212,160,0.15)" : "rgba(255,255,255,0.04)",
                        border: `1px solid ${visible ? "rgba(16,212,160,0.4)" : "var(--border)"}`,
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 11, fontWeight: 700,
                        color: visible ? "var(--accent)" : "var(--text-dim)",
                        transition: "all 0.4s ease",
                      }}>{j+1}</div>
                      <div style={{ fontSize: 14, color: visible ? "var(--text)" : "var(--text-dim)", paddingTop: 5, lineHeight: 1.6, transition: "color 0.4s ease" }}
                        dangerouslySetInnerHTML={{ __html: renderMixed(s) }} />
                    </div>
                  );
                })}
              </div>

              {/* Answer */}
              {allDone && sec.answer && (
                <div style={{ marginTop: 16 }}>
                  {!showAnswer ? (
                    <button onClick={() => setShowAnswer(true)}
                      style={{ padding: "8px 18px", borderRadius: 10, background: "rgba(16,212,160,0.1)", border: "1px solid rgba(16,212,160,0.25)", color: "var(--accent)", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "Sora, sans-serif" }}>
                      ✓ Жауапты көрсет
                    </button>
                  ) : (
                    <div style={{ padding: "12px 16px", background: "rgba(16,212,160,0.08)", border: "1px solid rgba(16,212,160,0.25)", borderRadius: 12, display: "flex", gap: 10, alignItems: "center", animation: "fadeIn 0.3s ease" }}>
                      <span style={{ color: "var(--accent)", fontWeight: 700, fontSize: 14 }}>✓</span>
                      <div dangerouslySetInnerHTML={{ __html: renderMixed(sec.answer) }} style={{ color: "white", fontSize: 15 }} />
                    </div>
                  )}
                </div>
              )}

              {/* Next step button */}
              {!allDone && (
                <button onClick={() => setRevealed(r => r + 1)}
                  className="btn-accent"
                  style={{ marginTop: 16, borderRadius: 10, padding: "9px 20px", fontSize: 13, display: "flex", alignItems: "center", gap: 6 }}>
                  {revealed === 0 ? "Бастау" : "Келесі қадам"} →
                </button>
              )}
            </div>
          </div>
        );
      };

      // ============================================================
      // THEORY VIEW — complete redesign
      // ============================================================
      const TheoryView = ({ grade, lessonId, onBack, onOpenLesson, onPickGrade, onGoTasks }) => {
        const lessons = useMemo(() => THEORY_BANK[grade] || [], [grade]);
        const [query, setQuery] = useState("");
        const [readProgress, setReadProgress] = useState(0);
        const contentRef = useRef(null);
        const pageRef = useRef(null);

        // Reading progress tracker
        useEffect(() => {
          const el = pageRef.current;
          if (!el) return;
          const track = () => {
            const scrolled = window.scrollY;
            const total = document.documentElement.scrollHeight - window.innerHeight;
            setReadProgress(total > 0 ? Math.min(100, Math.round((scrolled / total) * 100)) : 0);
          };
          window.addEventListener("scroll", track, { passive: true });
          return () => window.removeEventListener("scroll", track);
        }, []);

        const filtered = useMemo(() => {
          const q = query.trim().toLowerCase();
          if (!q) return lessons;
          return lessons.filter(l => l.title.toLowerCase().includes(q) || (l.summary||"").toLowerCase().includes(q));
        }, [lessons, query]);

        const activeLesson = lessons.find(l => l.id === lessonId) || filtered[0] || lessons[0] || null;
        const lessonIndex = lessons.findIndex(l => l.id === activeLesson?.id);
        const prevLesson = lessonIndex > 0 ? lessons[lessonIndex - 1] : null;
        const nextLesson = lessonIndex < lessons.length - 1 ? lessons[lessonIndex + 1] : null;

        // Track completed lessons
        const storageKey = `aqylai_theory_done_${grade}`;
        const [doneLessons, setDoneLessons] = useState(() => JSON.parse(localStorage.getItem(storageKey) || "[]"));
        const markDone = (id) => {
          const updated = [...new Set([...doneLessons, id])];
          setDoneLessons(updated);
          localStorage.setItem(storageKey, JSON.stringify(updated));
        };

        useEffect(() => {
          if (activeLesson?.id) {
            localStorage.setItem(`aqylai_theory_last_${grade}`, activeLesson.id);
            // Scroll content to top on lesson change
            contentRef.current?.scrollTo({ top: 0 });
            window.scrollTo({ top: 0, behavior: "smooth" });
          }
        }, [grade, activeLesson?.id]);

        // Map lesson id to topic key for "Practice" button
        const topicKeyForLesson = useMemo(() => {
          if (!activeLesson) return null;
          const topicMap = TASK_BANK[grade] || {};
          const title = (activeLesson.title || "").toLowerCase();
          return Object.keys(topicMap).find(k => topicMap[k].title?.toLowerCase() === title) || null;
        }, [activeLesson, grade]);

        const sectionCount = (activeLesson?.sections || []).length;

        return (
          <div ref={pageRef} style={{ minHeight: "100vh" }}>
            {/* Reading progress bar — fixed top */}
            <div style={{ position: "fixed", top: 0, left: 0, right: 0, height: 3, zIndex: 200, background: "rgba(255,255,255,0.05)" }}>
              <div style={{ height: "100%", background: "linear-gradient(90deg, var(--accent), #6366f1)", width: `${readProgress}%`, transition: "width 0.1s linear" }} />
            </div>

            <div style={{ maxWidth: 1200, margin: "0 auto", padding: "80px 24px 80px" }}>

              {/* ── TOP BAR ── */}
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 28, flexWrap: "wrap" }}>
                <button onClick={onBack} className="btn-ghost" style={{ borderRadius: 50, padding: "8px 16px", fontSize: 13, flexShrink: 0 }}>← Артқа</button>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 18 }}>📖</span>
                  <h1 style={{ fontSize: 20, fontWeight: 800, color: "white", margin: 0, letterSpacing: "-0.02em" }}>Теория</h1>
                </div>

                {/* Grade switcher */}
                <div style={{ marginLeft: "auto", display: "flex", gap: 6, background: "rgba(255,255,255,0.04)", border: "1px solid var(--border)", borderRadius: 12, padding: 4 }}>
                  {[7,8,9,10,11].map(g => (
                    <button key={g} onClick={() => onPickGrade(g)}
                      style={{
                        width: 36, height: 32, borderRadius: 8, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "Sora, sans-serif",
                        background: g === grade ? "var(--accent)" : "transparent",
                        color: g === grade ? "#050d14" : "var(--text-muted)",
                        border: "none", transition: "all 0.2s",
                      }}>{g}</button>
                  ))}
                </div>
              </div>

              {/* ── MAIN LAYOUT ── */}
              <div style={{ display: "grid", gridTemplateColumns: "260px 1fr", gap: 24, alignItems: "start" }}>

                {/* ── SIDEBAR ── */}
                <div style={{ position: "sticky", top: 84, display: "flex", flexDirection: "column", gap: 0, background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 18, overflow: "hidden" }}>
                  {/* Sidebar header */}
                  <div style={{ padding: "14px 16px", borderBottom: "1px solid var(--border)", background: "rgba(255,255,255,0.02)" }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 8 }}>
                      {doneLessons.length}/{lessons.length} аяқталды
                    </div>
                    <div style={{ height: 4, background: "var(--bg-card2)", borderRadius: 2, overflow: "hidden" }}>
                      <div style={{ height: "100%", background: "var(--accent)", width: `${lessons.length ? Math.round((doneLessons.length/lessons.length)*100) : 0}%`, transition: "width 0.5s ease" }} />
                    </div>
                  </div>

                  {/* Search */}
                  <div style={{ padding: "10px 12px", borderBottom: "1px solid var(--border)" }}>
                    <input className="input-field" placeholder="🔍 Іздеу..." value={query} onChange={e => setQuery(e.target.value)}
                      style={{ fontSize: 12, padding: "7px 10px" }} />
                  </div>

                  {/* Lesson list */}
                  <div style={{ overflowY: "auto", maxHeight: "calc(100vh - 280px)" }}>
                    {filtered.map((lesson, idx) => {
                      const isActive = lesson.id === activeLesson?.id;
                      const isDone = doneLessons.includes(lesson.id);
                      return (
                        <button key={lesson.id}
                          onClick={() => onOpenLesson(grade, lesson.id)}
                          style={{
                            width: "100%", textAlign: "left", padding: "11px 14px",
                            borderBottom: "1px solid rgba(255,255,255,0.04)",
                            cursor: "pointer", transition: "all 0.15s", fontFamily: "Sora, sans-serif",
                            background: isActive ? "rgba(16,212,160,0.08)" : "transparent",
                            borderLeft: `3px solid ${isActive ? "var(--accent)" : "transparent"}`,
                            borderRight: "none", borderTop: "none",
                            display: "flex", alignItems: "flex-start", gap: 10,
                          }}>
                          <div style={{ marginTop: 2, flexShrink: 0 }}>
                            {isDone
                              ? <div style={{ width: 16, height: 16, borderRadius: "50%", background: "var(--accent)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, color: "#050d14", fontWeight: 900 }}>✓</div>
                              : <div style={{ width: 16, height: 16, borderRadius: "50%", border: `1px solid ${isActive ? "var(--accent)" : "var(--border)"}`, fontSize: 9, color: "var(--text-dim)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700 }}>{idx+1}</div>
                            }
                          </div>
                          <div>
                            <div style={{ fontWeight: 600, fontSize: 12, color: isActive ? "var(--accent)" : isDone ? "var(--text-muted)" : "var(--text)", lineHeight: 1.4 }}>{lesson.title}</div>
                            {lesson.summary && <div style={{ fontSize: 10, marginTop: 2, color: "var(--text-dim)", lineHeight: 1.4 }}>{lesson.summary}</div>}
                          </div>
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* ── CONTENT AREA ── */}
                {activeLesson ? (
                  <div ref={contentRef} style={{ display: "flex", flexDirection: "column", gap: 20 }}>

                    {/* Lesson header card */}
                    <div style={{ background: "linear-gradient(135deg, rgba(16,212,160,0.07), rgba(99,102,241,0.05))", border: "1px solid rgba(16,212,160,0.2)", borderRadius: 20, padding: "28px 32px", position: "relative", overflow: "hidden" }}>
                      {/* Background decoration */}
                      <div style={{ position: "absolute", right: -40, top: -40, width: 200, height: 200, borderRadius: "50%", background: "radial-gradient(circle, rgba(16,212,160,0.08), transparent 70%)", pointerEvents: "none" }} />

                      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 16, flexWrap: "wrap" }}>
                        <div>
                          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                            <div style={{ fontSize: 11, fontWeight: 700, color: "var(--accent)", textTransform: "uppercase", letterSpacing: "0.12em" }}>
                              {grade}-сынып · Тақырып {lessonIndex + 1}/{lessons.length}
                            </div>
                            {doneLessons.includes(activeLesson.id) && (
                              <div style={{ padding: "2px 8px", borderRadius: 50, background: "rgba(16,212,160,0.12)", border: "1px solid rgba(16,212,160,0.3)", fontSize: 10, color: "var(--accent)", fontWeight: 700 }}>
                                ✓ Аяқталды
                              </div>
                            )}
                          </div>
                          <h2 style={{ fontSize: 26, fontWeight: 800, color: "white", letterSpacing: "-0.03em", margin: "0 0 8px" }}>{activeLesson.title}</h2>
                          {activeLesson.summary && (
                            <p style={{ fontSize: 14, color: "var(--text-muted)", margin: 0, lineHeight: 1.6 }}>{activeLesson.summary}</p>
                          )}
                        </div>

                        {/* Action buttons */}
                        <div style={{ display: "flex", flexDirection: "column", gap: 8, flexShrink: 0 }}>
                          {!doneLessons.includes(activeLesson.id) && (
                            <button onClick={() => markDone(activeLesson.id)}
                              style={{ padding: "8px 16px", borderRadius: 10, background: "rgba(16,212,160,0.1)", border: "1px solid rgba(16,212,160,0.25)", color: "var(--accent)", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "Sora, sans-serif", whiteSpace: "nowrap" }}>
                              ✓ Аяқталды деп белгіле
                            </button>
                          )}
                          {topicKeyForLesson && onGoTasks && (
                            <button onClick={() => onGoTasks(grade, topicKeyForLesson)}
                              className="btn-accent" style={{ borderRadius: 10, padding: "8px 16px", fontSize: 12, whiteSpace: "nowrap" }}>
                              🎯 Тапсырмаларды шеш
                            </button>
                          )}
                        </div>
                      </div>

                      {/* Section count chips */}
                      <div style={{ marginTop: 16, display: "flex", gap: 8, flexWrap: "wrap" }}>
                        {(activeLesson.sections || []).map((sec, i) => {
                          const cfg = {
                            definition: { icon: "📘", color: "#a5b4fc", bg: "rgba(99,102,241,0.1)" },
                            interactive_formula: { icon: "📐", color: "var(--accent)", bg: "rgba(16,212,160,0.08)" },
                            remember: { icon: "⚡", color: "#fbbf24", bg: "rgba(245,158,11,0.08)" },
                            example_steps: { icon: "🔢", color: "var(--text-muted)", bg: "rgba(255,255,255,0.05)" },
                          }[sec.type] || { icon: "•", color: "var(--text-muted)", bg: "rgba(255,255,255,0.04)" };
                          return (
                            <div key={i} style={{ padding: "3px 10px", borderRadius: 50, background: cfg.bg, fontSize: 11, color: cfg.color, fontWeight: 600 }}>
                              {cfg.icon} {sec.title}
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    {/* Section cards */}
                    {(activeLesson.sections || []).map((sec, i) => {
                      const key = `${activeLesson.id}-sec-${i}`;

                      // DEFINITION
                      if (sec.type === "definition") return (
                        <div key={key} style={{ background: "rgba(99,102,241,0.05)", border: "1px solid rgba(99,102,241,0.18)", borderRadius: 16, overflow: "hidden" }}>
                          <div style={{ padding: "10px 18px", borderBottom: "1px solid rgba(99,102,241,0.12)", background: "rgba(99,102,241,0.06)", display: "flex", alignItems: "center", gap: 8 }}>
                            <span style={{ fontSize: 15 }}>📘</span>
                            <span style={{ fontSize: 11, fontWeight: 700, color: "#a5b4fc", textTransform: "uppercase", letterSpacing: "0.12em" }}>{sec.title}</span>
                          </div>
                          <div style={{ padding: "16px 20px" }}>
                            {(sec.content||[]).map((c, j) => (
                              <div key={j} style={{ fontSize: 14, lineHeight: 1.75, color: "var(--text)", marginBottom: j < (sec.content.length-1) ? 8 : 0, paddingLeft: 12, borderLeft: "2px solid rgba(99,102,241,0.25)" }}
                                dangerouslySetInnerHTML={{ __html: renderMixed(c) }} />
                            ))}
                            <div style={{ marginTop: 14 }}>
                              <TheoryAIExplainer context={sec.content?.join(" ") || ""} lessonTitle={activeLesson.title} />
                            </div>
                          </div>
                        </div>
                      );

                      // FORMULA
                      if (sec.type === "interactive_formula") return (
                        <div key={key}>
                          <FormulaBlock title={sec.title} formula={sec.formula} />
                          <div style={{ marginTop: 8 }}>
                            <TheoryAIExplainer context={`Формула: ${sec.formula}`} lessonTitle={activeLesson.title} />
                          </div>
                        </div>
                      );

                      // REMEMBER
                      if (sec.type === "remember") return (
                        <div key={key} style={{ background: "rgba(245,158,11,0.05)", border: "1px solid rgba(245,158,11,0.2)", borderRadius: 16, overflow: "hidden" }}>
                          <div style={{ padding: "10px 18px", borderBottom: "1px solid rgba(245,158,11,0.12)", background: "rgba(245,158,11,0.05)", display: "flex", alignItems: "center", gap: 8 }}>
                            <span style={{ fontSize: 15 }}>⚡</span>
                            <span style={{ fontSize: 11, fontWeight: 700, color: "#fbbf24", textTransform: "uppercase", letterSpacing: "0.12em" }}>{sec.title}</span>
                          </div>
                          <div style={{ padding: "16px 20px", display: "flex", flexDirection: "column", gap: 10 }}>
                            {(sec.content||[]).map((c, j) => (
                              <div key={j} style={{ display: "flex", gap: 12, alignItems: "flex-start", padding: "10px 14px", background: "rgba(245,158,11,0.05)", borderRadius: 10, border: "1px solid rgba(245,158,11,0.1)" }}>
                                <span style={{ color: "#fbbf24", fontSize: 16, flexShrink: 0, marginTop: 1 }}>▸</span>
                                <div style={{ fontSize: 14, color: "var(--text)", lineHeight: 1.6 }} dangerouslySetInnerHTML={{ __html: renderMixed(c) }} />
                              </div>
                            ))}
                          </div>
                        </div>
                      );

                      // EXAMPLE STEPS — step-through
                      if (sec.type === "example_steps") return (
                        <StepThroughExample key={key} sec={sec} />
                      );

                      return null;
                    })}

                    {/* Examples from legacy field */}
                    {(activeLesson.examples || []).length > 0 && (
                      <div style={{ background: "rgba(99,102,241,0.04)", border: "1px solid rgba(99,102,241,0.15)", borderRadius: 16, overflow: "hidden" }}>
                        <div style={{ padding: "10px 18px", borderBottom: "1px solid rgba(99,102,241,0.1)", display: "flex", alignItems: "center", gap: 8 }}>
                          <span style={{ fontSize: 15 }}>💡</span>
                          <span style={{ fontSize: 11, fontWeight: 700, color: "#a5b4fc", textTransform: "uppercase", letterSpacing: "0.12em" }}>Қосымша мысалдар</span>
                        </div>
                        <div style={{ padding: "16px 20px", display: "flex", flexDirection: "column", gap: 16 }}>
                          {activeLesson.examples.map((ex, ei) => (
                            <div key={ei} style={{ padding: "14px 16px", background: "rgba(0,0,0,0.2)", borderRadius: 12 }}>
                              <div style={{ fontSize: 15, color: "white", marginBottom: 10 }} dangerouslySetInnerHTML={{ __html: renderLatexSafe(ex.question) }} />
                              {(ex.steps||[]).map((s, si) => (
                                <div key={si} style={{ display: "flex", gap: 10, marginBottom: 6, fontSize: 13, color: "var(--text-muted)" }}>
                                  <span style={{ color: "var(--text-dim)" }}>{si+1}.</span>
                                  <span dangerouslySetInnerHTML={{ __html: renderLatexSafe(s) }} />
                                </div>
                              ))}
                              {ex.answer && (
                                <div style={{ marginTop: 8, padding: "6px 12px", background: "rgba(16,212,160,0.07)", borderRadius: 8, fontSize: 13, color: "var(--accent)", fontWeight: 600 }}>
                                  = <span dangerouslySetInnerHTML={{ __html: renderLatexSafe(ex.answer) }} />
                                </div>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {/* Bottom navigation */}
                    <div style={{ display: "flex", justifyContent: "space-between", gap: 12, paddingTop: 8 }}>
                      {prevLesson ? (
                        <button onClick={() => onOpenLesson(grade, prevLesson.id)} className="btn-ghost"
                          style={{ borderRadius: 12, padding: "12px 20px", fontSize: 13, textAlign: "left", flex: 1 }}>
                          <div style={{ fontSize: 10, color: "var(--text-dim)", marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.1em" }}>← Алдыңғы</div>
                          <div style={{ color: "var(--text-muted)", fontWeight: 600 }}>{prevLesson.title}</div>
                        </button>
                      ) : <div style={{ flex: 1 }} />}

                      {nextLesson ? (
                        <button onClick={() => onOpenLesson(grade, nextLesson.id)} className="btn-ghost"
                          style={{ borderRadius: 12, padding: "12px 20px", fontSize: 13, textAlign: "right", flex: 1 }}>
                          <div style={{ fontSize: 10, color: "var(--text-dim)", marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.1em" }}>Келесі →</div>
                          <div style={{ color: "var(--text-muted)", fontWeight: 600 }}>{nextLesson.title}</div>
                        </button>
                      ) : (
                        <button onClick={() => markDone(activeLesson.id)}
                          className="btn-accent" style={{ borderRadius: 12, padding: "12px 20px", fontSize: 13, flex: 1 }}>
                          ✓ Тақырыпты аяқта
                        </button>
                      )}
                    </div>
                  </div>
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: 400, color: "var(--text-muted)", gap: 12 }}>
                    <div style={{ fontSize: 48 }}>📖</div>
                    <div style={{ fontSize: 15 }}>Сол жақтан тақырып таңдаңыз</div>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      };

      // ============================================================
      // TOPICS VIEW
      // ============================================================
      const TopicsView = ({ grade, onBack, onPickTopic }) => {
        const topics = TASK_BANK[grade] || {};
        
        return (
          <div style={{ maxWidth: 1100, margin: "0 auto", padding: "90px 24px 60px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 32 }}>
              <button onClick={onBack} className="btn-ghost" style={{ borderRadius: 50, padding: "8px 16px", fontSize: 13 }}>← Артқа</button>
              <h1 style={{ fontSize: 22, fontWeight: 800, color: "white", margin: 0 }}>{grade}-сынып тақырыптары</h1>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 16 }}>
              {Object.entries(topics).map(([key, topicData]) => {
                const total = (topicData.easy?.length||0)+(topicData.medium?.length||0)+(topicData.hard?.length||0);
                const raw = localStorage.getItem(`aqylai_progress_${grade}_${key}`);
                let solved = 0, zpd = 0;
                if (raw) { const p = JSON.parse(raw); solved = p.solved||0; zpd = p.zpd||0; }
                const percent = total ? Math.round((solved/total)*100) : 0;

                return (
                  <button key={key} onClick={() => onPickTopic(key)} className="topic-card" style={{ padding: 22, textAlign: "left" }}>
                    <div style={{ fontWeight: 700, fontSize: 15, color: "white", marginBottom: 8 }}>{topicData.title}</div>
                    <div style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 4 }}>{solved}/{total} тапсырма</div>
                    <div className="progress-bar" style={{ marginBottom: 8, height: 5 }}>
                      <div className="progress-fill" style={{ width: `${percent}%`, height: "100%" }} />
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11 }}>
                      <span style={{ color: "var(--text-muted)" }}>{percent}% аяқталды</span>
                      <span style={{ color: "var(--accent2)" }}>🧠 ZPD: {zpd}%</span>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        );
      };

      // ============================================================
      // TASKS VIEW
      // ============================================================
      const TasksView = ({ grade, topic, onBack }) => {
        const [history, setHistory] = useState({});
        const topicData = TASK_BANK[grade]?.[topic];
        const levels = ["easy", "medium", "hard"];
        const [levelIndex, setLevelIndex] = useState(0);
        const [current, setCurrent] = useState(0);
        const [correctCount, setCorrectCount] = useState(0);
        const [streak, setStreak] = useState(0);
        const [lastAnswer, setLastAnswer] = useState("");
        const [zpdScore, setZpdScore] = useState(0);

        if (!topicData) return <div style={{ padding: 40, color: "var(--text-muted)" }}>Бұл тақырыпта тапсырма жоқ.</div>;

        const level = levels[levelIndex];
        const tasks = topicData[level] || [];
        const totalTasks = (topicData.easy?.length||0)+(topicData.medium?.length||0)+(topicData.hard?.length||0);
        const answered = Object.keys(history).length;
        const correct = Object.values(history).filter(h=>h.correct).length;
        const accuracy = answered > 0 ? correct/answered : 0;
        const zpdPercent = Math.min(100, Math.round(accuracy * (levelIndex+1) * 33));
        const solvedCount = Object.values(history).filter(h=>h.correct).length;
        const percent = totalTasks > 0 ? Math.round((solvedCount/totalTasks)*100) : 0;

        const levelBadgeClass = level === "easy" ? "badge-easy" : level === "medium" ? "badge-medium" : "badge-hard";
        const levelLabel = { easy: "Жеңіл", medium: "Орташа", hard: "Қиын" }[level];

        const updateLevel = (isCorrect) => {
          const ns = isCorrect ? streak+1 : streak-1;
          setStreak(ns);
          if (ns >= 2 && levelIndex < 2) { setLevelIndex(p=>p+1); setStreak(0); setCurrent(0); }
          if (ns <= -2 && levelIndex > 0) { setLevelIndex(p=>p-1); setStreak(0); setCurrent(0); }
        };

        const onCheck = (ok) => {
          if (ok) { setCorrectCount(p=>p+1); setZpdScore(p=>p+(levelIndex+1)); }
          setHistory(prev => ({ ...prev, [tasks[current].id]: { answer: lastAnswer, correct: ok } }));
          updateLevel(ok);
        };

        const next = () => { if (history[tasks[current].id] && current < tasks.length-1) setCurrent(i=>i+1); };
        const prev = () => { if (current > 0) setCurrent(i=>i-1); };

        useEffect(() => {
          localStorage.setItem(`aqylai_progress_${grade}_${topic}`, JSON.stringify({ solved: correctCount, total: totalTasks, zpd: zpdPercent }));
        }, [correctCount, zpdPercent, grade, topic]);

        return (
          <div style={{ maxWidth: 1100, margin: "0 auto", padding: "90px 24px 60px" }}>
            {/* Header */}
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
              <button onClick={onBack} className="btn-ghost" style={{ borderRadius: 50, padding: "8px 16px", fontSize: 13 }}>← Артқа</button>
              <h1 style={{ fontSize: 20, fontWeight: 800, color: "white", margin: 0 }}>{grade}-сынып • {topicData.title}</h1>
              <div className={levelBadgeClass} style={{ marginLeft: "auto", padding: "5px 14px", borderRadius: 50, fontSize: 12, fontWeight: 700 }}>{levelLabel}</div>
            </div>

            {/* Progress bars */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 24 }}>
              <div style={{ background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 14, padding: "14px 18px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "var(--text-muted)", marginBottom: 8 }}>
                  <span>📈 Жалпы прогресс</span><span>{percent}%</span>
                </div>
                <div className="progress-bar" style={{ height: 6 }}>
                  <div className="progress-fill" style={{ width: `${percent}%`, height: "100%" }} />
                </div>
              </div>
              <div style={{ background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 14, padding: "14px 18px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "var(--text-muted)", marginBottom: 8 }}>
                  <span>🧠 ZPD индекс</span><span>{zpdPercent}%</span>
                </div>
                <div className="progress-bar" style={{ height: 6 }}>
                  <div style={{ height: "100%", borderRadius: 2, width: `${zpdPercent}%`, transition: "width 0.6s ease",
                    background: zpdPercent < 40 ? "#ef4444" : zpdPercent < 70 ? "#f59e0b" : "var(--accent)" }} />
                </div>
              </div>
            </div>

            {/* Main grid */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 380px", gap: 20, alignItems: "start" }}>
              {/* Left: task */}
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                {/* Task nav */}
                <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 16px", background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 14 }}>
                  <span style={{ fontSize: 12, color: "var(--text-muted)" }}>
                    {current+1} / {tasks.length} тапсырма
                  </span>
                  <div style={{ flex: 1, height: 3, background: "var(--bg-card2)", borderRadius: 2, overflow: "hidden" }}>
                    <div style={{ height: "100%", background: "var(--accent)", width: `${((current+1)/tasks.length)*100}%`, transition: "width 0.3s ease" }} />
                  </div>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button onClick={prev} disabled={current===0} className="btn-ghost"
                      style={{ borderRadius: 8, padding: "4px 12px", fontSize: 13, opacity: current===0?0.3:1 }}>←</button>
                    <button onClick={next} disabled={!history[tasks[current]?.id] || current===tasks.length-1}
                      className={history[tasks[current]?.id] && current<tasks.length-1 ? "btn-accent" : "btn-ghost"}
                      style={{ borderRadius: 8, padding: "4px 12px", fontSize: 13, opacity: (!history[tasks[current]?.id] || current===tasks.length-1)?0.3:1 }}>→</button>
                  </div>
                </div>

                <TaskCard idx={current} task={tasks[current]} onCheck={onCheck} onAnswerChange={setLastAnswer} historyEntry={history[tasks[current]?.id]} />
              </div>

              {/* Right: AI */}
              <div style={{ position: "sticky", top: 80 }}>
                <AssistantPanel task={tasks[current]} userAnswer={lastAnswer} />
              </div>
            </div>
          </div>
        );
      };

      // ============================================================
      // ABOUT VIEW
      // ============================================================
      const AboutView = ({ onBack }) => (
        <div style={{ maxWidth: 900, margin: "0 auto", padding: "100px 24px 60px" }}>
          <button onClick={onBack} className="btn-ghost" style={{ borderRadius: 50, padding: "8px 16px", fontSize: 13, marginBottom: 32 }}>← Артқа</button>
          <h1 style={{ fontSize: 40, fontWeight: 800, color: "white", letterSpacing: "-0.03em", marginBottom: 20 }}>AqylAI туралы</h1>
          <p style={{ fontSize: 16, color: "var(--text-muted)", lineHeight: 1.8, maxWidth: 700, marginBottom: 32 }}>
            AqylAI — жасанды интеллектке негізделген бейімделмелі оқу жүйесі. Платформа оқушының деңгейін талдап, тапсырмаларды автоматты түрде EASY → MEDIUM → HARD деңгейлері арасында бейімдейді.
          </p>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
            {[
              { t: "Біздің мақсатымыз", d: "Қазақстан оқушыларына сапалы, интеллектуалды және қолжетімді дайындық платформасын ұсыну." },
              { t: "Негізгі технология", d: "ZPD индексі, адаптивті алгоритм және GitHub Models API арқылы AI көмекші." },
            ].map((c,i) => (
              <div key={i} style={{ background: "var(--bg-card)", border: "1px solid var(--border)", borderRadius: 16, padding: 24 }}>
                <div style={{ fontWeight: 700, fontSize: 16, color: "white", marginBottom: 10 }}>{c.t}</div>
                <div style={{ fontSize: 14, color: "var(--text-muted)", lineHeight: 1.7 }}>{c.d}</div>
              </div>
            ))}
          </div>
        </div>
      );

      // ============================================================
      // THEORY SECTION CARD (landing)
      // ============================================================
      const LessonCard = ({ lesson, onClick }) => (
        <div onClick={onClick} className="topic-card" style={{ padding: 20, cursor: "pointer" }}>
          <div style={{ fontWeight: 600, fontSize: 14, color: "white", marginBottom: 6 }}>{lesson.title}</div>
          {lesson.summary && <div style={{ fontSize: 12, color: "var(--text-muted)" }}>{lesson.summary}</div>}
        </div>
      );

      // ============================================================
      // MAIN APP
      // ============================================================
      function AqyAIApp() {
        const router = useRouterMock();
        const [gradeModal, setGradeModal] = useState(false);

        useEffect(() => { window.scrollTo({ top: 0, behavior: "auto" }); }, []);

        const atRoot = router.path === "/";
        const atProfile = router.path === "/profile";
        const atAbout = router.path === "/about";

        const gradeMatch = router.path.match(/\/c\/aqylai\/grade-(\d+)/);
        const selectedGrade = gradeMatch ? Number(gradeMatch[1]) : null;

        const topicMatch = router.path.match(/\/topic-([^\/]+)/);
        const selectedTopic = topicMatch ? decodeURIComponent(topicMatch[1]) : null;

        const isTopicsPage = /\/topics$/.test(router.path);

        const theoryMatch = router.path.match(/^\/c\/aqylai\/theory-(\d+)(?:\/([\w-]+))?$/);
        const theoryGrade = theoryMatch ? Number(theoryMatch[1]) : null;
        const theoryLessonId = theoryMatch?.[2] || (theoryGrade ? localStorage.getItem(`aqylai_theory_last_${theoryGrade}`) : null);

        const goTopics = (grade) => {
          router.push(`/c/aqylai/grade-${grade}/topics`);
          setGradeModal(false);
          setTimeout(() => window.scrollTo({ top: 0, behavior: "instant" }), 0);
        };

        const goTheory = () => {
          const g = Number(localStorage.getItem("aqylai_grade") || 8);
          router.push(makeTheoryPath(g));
        };

        return (
          <div style={{ minHeight: "100vh", color: "var(--text)" }}>
            <TopNav router={router} />
            <GradePickerModal open={gradeModal} onClose={() => setGradeModal(false)} onPick={goTopics} />

            {/* LANDING */}
            {atRoot && (
              <>
                <Hero onStart={() => setGradeModal(true)} />
                <FeaturesSection />
                <ResultsSection />
                <ContactSection />
                <Footer router={router} />
              </>
            )}

            {/* PROFILE */}
            {atProfile && (
              <ProfileView
                onBack={() => router.push("/")}
                onGoTasks={(g) => goTopics(g)}
              />
            )}

            {/* ABOUT */}
            {atAbout && <AboutView onBack={() => router.push("/")} />}

            {/* THEORY */}
            {theoryGrade && (
              <TheoryView
                grade={theoryGrade}
                lessonId={theoryLessonId}
                onBack={() => router.push("/")}
                onOpenLesson={(g, id) => router.push(makeTheoryLessonPath(g, id))}
                onPickGrade={(g) => router.push(makeTheoryPath(g))}
                onGoTasks={(g, topicKey) => router.push(`/c/aqylai/grade-${g}/topic-${encodeURIComponent(topicKey)}`)}
              />
            )}

            {/* TOPICS */}
            {selectedGrade && isTopicsPage && !selectedTopic && (
              <TopicsView
                grade={selectedGrade}
                onBack={() => router.push("/")}
                onPickTopic={(t) => router.push(`/c/aqylai/grade-${selectedGrade}/topic-${encodeURIComponent(t)}`)}
              />
            )}

            {/* TASKS */}
            {selectedGrade && selectedTopic && (
              <TasksView
                grade={selectedGrade}
                topic={selectedTopic}
                onBack={() => router.push(`/c/aqylai/grade-${selectedGrade}/topics`)}
              />
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<AqyAIApp />);
    </script>
  </body>
</html>
